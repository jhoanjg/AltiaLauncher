appId: 'altialauncher'
productName: 'AltiaLauncher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2026 AltiaLauncher'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs}'

extraResources:
  - 'libraries'

# Windows Configuration
win:
  target:
    - target: 'nsis'
      arch: 'x64'
  signAndEditExecutable: false

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux: 
  target: 'AppImage'
  maintainer: 'AltiaLauncher'
  vendor: 'AltiaLauncher'
  synopsis: 'Launcher de Minecraft personalizado'
  description: 'Launcher personalizado que permite a los jugadores unirse a servidores con mods. Todos los mods, configuraciones y actualizaciones se manejan automaticamente.'
  category: 'Game'


directories:
  buildResources: 'build'
  output: 'dist'